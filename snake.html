<!DOCTYPE html>
<html>
<head>
    <title>Snake Game - Earn Tickets</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.unityads.unity3d.com/unity-advertising.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            background: #1a1a2e; 
            color: white; 
            font-family: Arial;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }
        
        .back-btn {
            background: #333;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        
        .ticket-earning {
            text-align: center;
            background: rgba(0,255,0,0.1);
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
        }
        
        .ticket-earning h3 {
            color: #4CAF50;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            background: #0f3460;
            border: 3px solid #4CAF50;
            border-radius: 10px;
        }
        
        .game-stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
        }
        
        .stat-box {
            text-align: center;
        }
        
        .stat-box h3 {
            font-size: 24px;
            color: #4CAF50;
        }
        
        .touch-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .touch-btn {
            height: 60px;
            background: #333;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
        }
        
        .center-btn {
            grid-column: 2;
        }
        
        .ad-offer {
            background: linear-gradient(135deg, #FF9800, #FF5722);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        
        .ad-btn {
            background: white;
            color: #FF5722;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        
        .ad-container {
            height: 100px;
            background: #222;
            border-radius: 10px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Game Header -->
    <div class="game-header">
        <button class="back-btn" onclick="exitGame()">←</button>
        <h2>🐍 Snake Game</h2>
        <div style="color:#4CAF50;">
            🎫 <span id="gameTickets">0</span>
        </div>
    </div>
    
    <!-- Ticket Earning Info -->
    <div class="ticket-earning">
        <h3>⏰ Earning 1 Ticket per Minute</h3>
        <p>Time Played: <span id="gameTime">0</span> seconds</p>
    </div>
    
    <!-- Unity Ad -->
    <div class="ad-container" id="snakeAd1"></div>
    
    <!-- Game Canvas -->
    <canvas id="gameCanvas" width="300" height="300"></canvas>
    
    <!-- Game Stats -->
    <div class="game-stats">
        <div class="stat-box">
            <div>SCORE</div>
            <h3 id="score">0</h3>
        </div>
        <div class="stat-box">
            <div>HIGH</div>
            <h3 id="highScore">0</h3>
        </div>
        <div class="stat-box">
            <div>TICKETS</div>
            <h3 id="currentTickets">0</h3>
        </div>
    </div>
    
    <!-- Touch Controls -->
    <div class="touch-controls">
        <div></div>
        <button class="touch-btn center-btn" onclick="move('up')">⬆️</button>
        <div></div>
        
        <button class="touch-btn" onclick="move('left')">⬅️</button>
        <button class="touch-btn" onclick="pauseGame()">⏸️</button>
        <button class="touch-btn" onclick="move('right')">➡️</button>
        
        <div></div>
        <button class="touch-btn center-btn" onclick="move('down')">⬇️</button>
        <div></div>
    </div>
    
    <!-- Ad Offer -->
    <div class="ad-offer">
        <h3>🎁 Want Double Tickets?</h3>
        <p>Watch a 30-second ad to earn 2x tickets!</p>
        <button class="ad-btn" onclick="watchAdForBonus()">
            📺 Watch Ad for 2x Tickets
        </button>
    </div>
    
    <!-- Unity Ad -->
    <div class="ad-container" id="snakeAd2"></div>
    
    <script>
        // Game Variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{x:10, y:10}];
        let food = {x:15, y:15};
        let dx = 0, dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHigh') || 0;
        let gameTime = 0;
        let ticketsEarned = 0;
        let gameRunning = false;
        let gameInterval;
        let timeInterval;
        
        document.getElementById('highScore').textContent = highScore;
        
        // Draw Game
        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#0f3460';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#00ff88' : '#00cc66';
                ctx.fillRect(segment.x*gridSize, segment.y*gridSize, gridSize-2, gridSize-2);
                
                // Draw eyes on head
                if(index === 0) {
                    ctx.fillStyle = 'white';
                    const eyeSize = 3;
                    const offset = 5;
                    
                    if(dx === 1) { // Right
                        ctx.fillRect(segment.x*gridSize + gridSize - offset, segment.y*gridSize + offset, eyeSize, eyeSize);
                        ctx.fillRect(segment.x*gridSize + gridSize - offset, segment.y*gridSize + gridSize - offset - eyeSize, eyeSize, eyeSize);
                    } else if(dx === -1) { // Left
                        ctx.fillRect(segment.x*gridSize + offset, segment.y*gridSize + offset, eyeSize, eyeSize);
                        ctx.fillRect(segment.x*gridSize + offset, segment.y*gridSize + gridSize - offset - eyeSize, eyeSize, eyeSize);
                    } else if(dy === -1) { // Up
                        ctx.fillRect(segment.x*gridSize + offset, segment.y*gridSize + offset, eyeSize, eyeSize);
                        ctx.fillRect(segment.x*gridSize + gridSize - offset - eyeSize, segment.y*gridSize + offset, eyeSize, eyeSize);
                    } else if(dy === 1) { // Down
                        ctx.fillRect(segment.x*gridSize + offset, segment.y*gridSize + gridSize - offset, eyeSize, eyeSize);
                        ctx.fillRect(segment.x*gridSize + gridSize - offset - eyeSize, segment.y*gridSize + gridSize - offset, eyeSize, eyeSize);
                    }
                }
            });
            
            // Draw food
            ctx.fillStyle = '#ff5555';
            ctx.beginPath();
            ctx.arc(food.x*gridSize + gridSize/2, food.y*gridSize + gridSize/2, gridSize/2-2, 0, Math.PI*2);
            ctx.fill();
        }
        
        // Move Function
        function move(direction) {
            if(!gameRunning) {
                gameRunning = true;
                startGame();
            }
            
            // Prevent reversing
            if(direction === 'up' && dy !== 1) { dx=0; dy=-1; }
            if(direction === 'down' && dy !== -1) { dx=0; dy=1; }
            if(direction === 'left' && dx !== 1) { dx=-1; dy=0; }
            if(direction === 'right' && dx !== -1) { dx=1; dy=0; }
        }
        
        // Start Game
        function startGame() {
            // Start game loop
            gameInterval = setInterval(updateGame, 150);
            
            // Start time counter for tickets
            timeInterval = setInterval(() => {
                gameTime++;
                document.getElementById('gameTime').textContent = gameTime;
                
                // Earn 1 ticket every 60 seconds
                if(gameTime % 60 === 0) {
                    earnTicket(1);
                }
            }, 1000);
            
            // Show ad at start
            showUnityAd('interstitial');
        }
        
        // Update Game
        function updateGame() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Wall collision
            if(head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // Self collision
            for(let segment of snake) {
                if(head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // Food collision
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                
                // Generate new food
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                // Check if food is on snake
                let foodOnSnake;
                do {
                    foodOnSnake = false;
                    for(let segment of snake) {
                        if(food.x === segment.x && food.y === segment.y) {
                            foodOnSnake = true;
                            food.x = Math.floor(Math.random() * tileCount);
                            food.y = Math.floor(Math.random() * tileCount);
                            break;
                        }
                    }
                } while(foodOnSnake);
                
            } else {
                snake.pop();
            }
            
            drawGame();
        }
        
        // Earn Ticket
        function earnTicket(amount) {
            ticketsEarned += amount;
            
            // Update display
            document.getElementById('gameTickets').textContent = ticketsEarned;
            document.getElementById('currentTickets').textContent = ticketsEarned;
            
            // Save to localStorage
            const currentTickets = parseInt(localStorage.getItem('userTickets') || 0);
            const newTickets = currentTickets + amount;
            localStorage.setItem('userTickets', newTickets);
            
            // Show notification
            showTicketNotification(amount);
        }
        
        // Show Ticket Notification
        function showTicketNotification(amount) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8);
                color: #FFD700;
                padding: 20px;
                border-radius: 10px;
                font-size: 24px;
                z-index: 1000;
                animation: fadeInOut 2s;
            `;
            notification.innerHTML = `🎫 +${amount} Ticket Earned!`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }
        
        // Game Over
        function gameOver() {
            clearInterval(gameInterval);
            clearInterval(timeInterval);
            gameRunning = false;
            
            // Update high score
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHigh', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            // Show ad on game over
            showUnityAd('interstitial');
            
            // Show game over message
            setTimeout(() => {
                alert(`Game Over!\n\nScore: ${score}\nTickets Earned: ${ticketsEarned}\nTime Played: ${Math.floor(gameTime/60)} minutes`);
            }, 500);
        }
        
        // Pause Game
        function pauseGame() {
            if(gameRunning) {
                clearInterval(gameInterval);
                clearInterval(timeInterval);
                gameRunning = false;
                alert('Game Paused. Tickets still counting!');
            } else {
                gameRunning = true;
                gameInterval = setInterval(updateGame, 150);
                timeInterval = setInterval(() => {
                    gameTime++;
                    document.getElementById('gameTime').textContent = gameTime;
                    if(gameTime % 60 === 0) earnTicket(1);
                }, 1000);
            }
        }
        
        // Watch Ad for Bonus
        function watchAdForBonus() {
            showUnityAd('rewardedVideo').then(() => {
                // Double the tickets
                const bonus = ticketsEarned; // Same amount as earned
                earnTicket(bonus);
                alert(`🎉 Bonus! You earned ${bonus} extra tickets!`);
            });
        }
        
        // Exit Game
        function exitGame() {
            if(gameRunning) {
                if(confirm('Exit game? Tickets earned will be saved.')) {
                    clearInterval(gameInterval);
                    clearInterval(timeInterval);
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        }
        
        // Unity Ads Functions
        function showUnityAd(type) {
            return new Promise((resolve) => {
                if(window.unity3d && unity3d.isReady(type)) {
                    unity3d.display(type, {
                        onComplete: resolve
                    });
                } else {
                    resolve(); // Continue if ads not ready
                }
            });
        }
        
        // Initialize Ads
        function initAds() {
            if(window.unity3d) {
                unity3d.init({
                    gameId: 'YOUR_UNITY_GAME_ID',
                    onInitComplete: function() {
                        // Load banner ads
                        ['snakeAd1', 'snakeAd2'].forEach(containerId => {
                            if(unity3d.isReady('banner')) {
                                unity3d.display('banner', {
                                    containerId: containerId,
                                    width: 300,
                                    height: 100
                                });
                            }
                        });
                    }
                });
            }
        }
        
        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft') move('left');
            if(e.key === 'ArrowRight') move('right');
            if(e.key === 'ArrowUp') move('up');
            if(e.key === 'ArrowDown') move('down');
            if(e.key === ' ') pauseGame();
        });
        
        // Touch Controls for Mobile
        let touchStartX, touchStartY;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        });
        
        canvas.addEventListener('touchmove', (e) => {
            if(!touchStartX || !touchStartY) return;
            
            let touchEndX = e.touches[0].clientX;
            let touchEndY = e.touches[0].clientY;
            
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;
            
            if(Math.abs(dx) > Math.abs(dy)) {
                if(dx > 0) move('right');
                else move('left');
            } else {
                if(dy > 0) move('down');
                else move('up');
            }
            
            touchStartX = null;
            touchStartY = null;
            e.preventDefault();
        }, {passive: false});
        
        // Initialize
        window.onload = function() {
            drawGame();
            initAds();
        };
    </script>
</body>
</html>
