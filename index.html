<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(circle at 20% 10%,#0b001c,#010002);font-family:'Orbitron',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;color:white}
.container{max-width:550px;width:100%;background:rgba(5,2,15,.8);backdrop-filter:blur(20px);border:1px solid rgba(0,255,255,.3);border-radius:60px 60px 40px 40px;padding:30px 24px;box-shadow:0 0 50px #00ffff30,0 0 0 2px #a855f7 inset}
h1{font-size:26px;font-weight:900;text-align:center;letter-spacing:5px;margin-bottom:20px}
.btn-group{display:flex;gap:15px;justify-content:center;margin:20px 0}
.btn{background:black;border:2px solid #0ff;color:white;padding:14px 25px;border-radius:40px;font-weight:700;cursor:pointer;flex:1}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:25px 0}
.cell{aspect-ratio:1;background:#140022;border:2px solid #b300ff;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:50px;cursor:pointer}
.status{text-align:center;margin:10px 0}
.hidden{display:none}
</style>

<body>

<div class="container">
<h1>⚡ PRO T3</h1>

<div id="menuPanel" class="btn-group">
<button id="aiModeBtn" class="btn">VS AI</button>
<button id="multiModeBtn" class="btn">ONLINE</button>
</div>

<div id="gamePanel" class="hidden">
<div id="boardGrid" class="board"></div>
<div id="statusMsg" class="status"></div>
<div class="btn-group">
<button id="restartGameBtn" class="btn">RESTART</button>
<button id="exitGameBtn" class="btn">EXIT</button>
</div>
</div>
</div>

<script src="https://quge5.com/88/tag.min.js" data-zone="210374" async data-cfasync="false"></script>

<script>
// FIREBASE CONFIG
const firebaseConfig={
apiKey:"AIzaSyDCmXCdvLV8--2ZXYmCpAgLR3cogj0cGG8",
authDomain:"freegm-4601f.firebaseapp.com",
databaseURL:"https://freegm-4601f-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"freegm-4601f",
storageBucket:"freegm-4601f.appspot.com",
messagingSenderId:"30234171811",
appId:"1:30234171811:web:70a6c3cfd365a874cfa216"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let board=["","","","","","","","",""];
let current="X";
let mode="";
let mySymbol=null;
let gameRef=null;

const winPatterns=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function render(){
const el=document.getElementById("boardGrid");
el.innerHTML="";
board.forEach((v,i)=>{
const c=document.createElement("div");
c.className="cell";
c.textContent=v;
c.onclick=()=>move(i);
el.appendChild(c);
});
}

function winner(){
for(let p of winPatterns)
if(board[p[0]]&&board[p[0]]===board[p[1]]&&board[p[1]]===board[p[2]])
return board[p[0]];
return board.includes("")?null:"draw";
}

function updateUI(){
render();
let w=winner();
let s=document.getElementById("statusMsg");
if(w){
s.innerText=w==="draw"?"DRAW":w+" WINS";
}else{
s.innerText=current+"'s TURN";
}
}

function aiMove(){
let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
return empty[Math.random()*empty.length|0];
}

function move(i){
if(board[i]!==""||winner())return;
if(mode==="AI"){
board[i]=current;
current=current==="X"?"O":"X";
updateUI();
if(current==="O"&&!winner()){
let idx=aiMove();
board[idx]="O";
current="X";
updateUI();
}
}
}

function reset(){
board=["","","","","","","","",""];
current="X";
updateUI();
}

function startAI(){
mode="AI";
document.getElementById("menuPanel").classList.add("hidden");
document.getElementById("gamePanel").classList.remove("hidden");
reset();
}

function exitGame(){
mode="";
document.getElementById("menuPanel").classList.remove("hidden");
document.getElementById("gamePanel").classList.add("hidden");
}

window.onload=()=>{
firebase.auth().signInAnonymously();
document.getElementById("aiModeBtn").onclick=startAI;
document.getElementById("restartGameBtn").onclick=reset;
document.getElementById("exitGameBtn").onclick=exitGame;
updateUI();
};
</script>

</body>
