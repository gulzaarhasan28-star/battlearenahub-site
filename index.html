<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="monetag" content="c49ccf84380e74c2a3c3a3002e9e8802">
<title>Tic Tac Toe Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:radial-gradient(circle at top,#1a0033,#050010);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
width:360px;
}

h1{
margin-bottom:20px;
}

button{
background:#111;
color:#fff;
border:2px solid #00f6ff;
padding:10px 20px;
margin:5px;
cursor:pointer;
border-radius:8px;
box-shadow:0 0 15px #00f6ff;
}

button:hover{
box-shadow:0 0 25px #00f6ff;
}

.board{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.cell{
height:100px;
background:#0b001a;
border:2px solid #6b21a8;
font-size:40px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

.status{
margin-top:15px;
font-size:14px;
}
.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Tic Tac Toe Pro</h1>

<div id="menu">
<button onclick="startAI()">Play vs AI</button>
<button onclick="startMulti()">Play Multiplayer</button>
</div>

<div id="game" class="hidden">
<div id="board" class="board"></div>
<div id="status" class="status"></div>
<button onclick="resetGame()">Restart</button>
<button onclick="location.reload()">Back</button>
</div>

</div>

<script>
/* ================= FIREBASE ================= */

const firebaseConfig = {
apiKey: "AIzaSyDCmXCdvLV8--2ZXYmCpAgLR3cogj0cGG8",
authDomain: "freegm-4601f.firebaseapp.com",
databaseURL: "https://freegm-4601f-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "freegm-4601f",
storageBucket: "freegm-4601f.appspot.com",
messagingSenderId: "30234171811",
appId: "1:30234171811:web:70a6c3cfd365a874cfa216"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* ================= GAME ================= */

let board=["","","","","","","","",""];
let current="X";
let mode="";
let gameRef=null;
let mySymbol=null;

const winComb=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function createBoard(){
const b=document.getElementById("board");
b.innerHTML="";
board.forEach((v,i)=>{
const c=document.createElement("div");
c.className="cell";
c.innerText=v;
c.onclick=()=>move(i);
b.appendChild(c);
});
}

function checkWin(){
for(let c of winComb){
if(board[c[0]]&&board[c[0]]===board[c[1]]&&board[c[1]]===board[c[2]]){
return board[c[0]];
}
}
if(!board.includes("")) return "draw";
return null;
}

function move(i){
if(board[i]!==""||checkWin()) return;

if(mode==="AI"){
board[i]=current;
current="O";
aiMove();
}else{
if(current!==mySymbol) return;
gameRef.transaction(g=>{
if(!g||g.board[i]!==""||g.turn!==mySymbol) return g;
g.board[i]=mySymbol;
g.turn=mySymbol==="X"?"O":"X";
return g;
});
}
update();
}

function aiMove(){
let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
if(empty.length===0) return;
let r=empty[Math.floor(Math.random()*empty.length)];
board[r]="O";
current="X";
update();
}

function update(){
createBoard();
let w=checkWin();
if(w){
document.getElementById("status").innerText=
w==="draw"?"Match Draw":w+" Wins!";
}else{
document.getElementById("status").innerText=
mode==="AI"?(current==="X"?"Your Turn":"AI Turn"):
(current===mySymbol?"Your Turn":"Opponent Turn");
}
}

function resetGame(){
board=["","","","","","","","",""];
current="X";
update();
}

/* ================= AI MODE ================= */

function startAI(){
mode="AI";
document.getElementById("menu").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
createBoard();
update();
}

/* ================= MULTIPLAYER ================= */

function startMulti(){
mode="MULTI";
document.getElementById("menu").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

const id="p_"+Math.random().toString(36).substr(2,9);
const wait=db.ref("waiting");

wait.once("value",snap=>{
if(!snap.exists()){
wait.child(id).set(true);
wait.child(id).onDisconnect().remove();
document.getElementById("status").innerText="Waiting for opponent...";
}else{
const opp=Object.keys(snap.val())[0];
const gId=db.ref("games").push().key;

db.ref("games/"+gId).set({
board:["","","","","","","","",""],
turn:"X",
players:{X:opp,O:id}
});

wait.child(opp).remove();
mySymbol="O";
connectGame(gId);
}
});

db.ref("games").on("child_added",snap=>{
const g=snap.val();
if(g.players&&g.players.X===id){
mySymbol="X";
connectGame(snap.key);
}
});
}

function connectGame(id){
gameRef=db.ref("games/"+id);

gameRef.on("value",snap=>{
const g=snap.val();
if(!g) return;
board=g.board;
current=g.turn;
update();
});
}
</script>
