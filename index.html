<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Tic Tac Toe Multiplayer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
/* ================= THEME ================= */
body {
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:radial-gradient(circle at top,#1a0033,#050010);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.hidden { display:none; }

button {
  background:#111;
  color:#fff;
  border:2px solid #00f6ff;
  padding:12px 25px;
  font-size:16px;
  cursor:pointer;
  border-radius:8px;
  text-shadow:0 0 8px #00f6ff;
  box-shadow:0 0 15px #00f6ff;
}

button:hover {
  box-shadow:0 0 25px #00f6ff;
}

/* ================= START SCREEN ================= */
#startScreen {
  text-align:center;
}

/* ================= GAME SCREEN ================= */
#gameScreen {
  width:360px;
}

/* Player Display */
.players {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
.player {
  width:48%;
  padding:10px;
  text-align:center;
  border-radius:8px;
}
.player.x {
  border:2px solid #00f6ff;
  box-shadow:0 0 15px #00f6ff;
}
.player.o {
  border:2px solid #ff2cff;
  box-shadow:0 0 15px #ff2cff;
}

/* Status */
#status {
  text-align:center;
  margin:10px 0;
}

/* Board */
.board {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin:15px 0;
}
.cell {
  height:100px;
  background:#0b001a;
  border:2px solid #6b21a8;
  box-shadow:0 0 15px #6b21a8;
  font-size:48px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.cell.x {
  color:#00f6ff;
  text-shadow:0 0 20px #00f6ff;
}
.cell.o {
  color:#ff2cff;
  text-shadow:0 0 20px #ff2cff;
}

/* Pop animation */
.cell span {
  animation:pop .2s ease-out;
}
@keyframes pop {
  from { transform:scale(0); }
  to { transform:scale(1); }
}

/* Controls */
.controls {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

/* Pulse animation */
.pulse {
  animation:pulse 1s infinite;
}
@keyframes pulse {
  0% { box-shadow:0 0 10px #ff2cff; }
  50% { box-shadow:0 0 30px #ff2cff; }
  100% { box-shadow:0 0 10px #ff2cff; }
}

/* ================= CHAT ================= */
.chat {
  margin-top:15px;
  background:#050010;
  border:2px solid #00f6ff;
  border-radius:8px;
  padding:5px;
}
#messages {
  height:120px;
  overflow-y:auto;
  font-size:13px;
}
.msg {
  margin:5px;
  padding:6px 10px;
  border-radius:8px;
  max-width:80%;
}
.me {
  background:#ff2cff;
  margin-left:auto;
}
.other {
  background:#00f6ff;
  color:#000;
}
.chatInput {
  display:flex;
}
.chatInput input {
  flex:1;
  padding:8px;
  background:#111;
  border:none;
  color:#fff;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>⚡ Neon Tic Tac Toe</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="hidden">
  <div class="players">
    <div class="player o">Player O</div>
    <div class="player x">Player X</div>
  </div>

  <div id="status">Waiting for opponent...</div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button id="againBtn" onclick="playAgain()">Play Again</button>
    <button onclick="endGame()">End Game</button>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div id="messages"></div>
    <div class="chatInput">
      <input id="chatInput" placeholder="Type message">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<script>
/* ================= FIREBASE ================= */

// <<< PASTE YOUR FIREBASE CONFIGURATION OBJECT HERE >>>
const firebaseConfig = {
  apiKey: "AIzaSyDCmXCdvLV8--2ZXYmCpAgLR3cogj0cGG8",
  authDomain: "freegm-4601f.firebaseapp.com",
  databaseURL: "https://freegm-4601f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "freegm-4601f",
  storageBucket: "freegm-4601f.firebasestorage.app",
  messagingSenderId: "30234171811",
  appId: "1:30234171811:web:70a6c3cfd365a874cfa216"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= GAME STATE ================= */
let playerId = "p_" + Math.random().toString(36).substr(2,9);
let gameId = null;
let mySymbol = null;
let gameRef = null;

/* ================= MATCHMAKING ================= */
function startGame() {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  const waitingRef = db.ref("waitingPlayers");
  waitingRef.once("value", snap => {
    if (!snap.exists()) {
      waitingRef.child(playerId).set(true);
      waitingRef.child(playerId).onDisconnect().remove();
      document.getElementById("status").innerText="Waiting for opponent...";
    } else {
      const opponent = Object.keys(snap.val())[0];
      gameId = db.ref("games").push().key;

      db.ref("games/"+gameId).set({
        board:["","","","","","","","",""],
        turn:"X",
        players:{X:opponent,O:playerId},
        status:"playing",
        rematch:{}
      });

      waitingRef.child(opponent).remove();
      mySymbol="O";
      initGame();
    }
  });

  db.ref("games").on("child_added", snap => {
    const g = snap.val();
    if (g.players && g.players.X===playerId) {
      gameId=snap.key;
      mySymbol="X";
      initGame();
    }
  });
}

/* ================= GAME INIT ================= */
function initGame() {
  gameRef=db.ref("games/"+gameId);
  document.getElementById("status").innerText="Game Started";

  const board=document.getElementById("board");
  board.innerHTML="";
  for(let i=0;i<9;i++){
    const c=document.createElement("div");
    c.className="cell";
    c.onclick=()=>makeMove(i);
    board.appendChild(c);
  }

  gameRef.on("value", snap=>{
    const g=snap.val();
    if(!g) return;
    updateBoard(g.board);
    updateStatus(g);
  });

  listenChat();
}

/* ================= GAME LOGIC ================= */
function makeMove(i){
  gameRef.transaction(g=>{
    if(!g||g.status!=="playing") return g;
    if(g.board[i]!==""||g.turn!==mySymbol) return g;
    g.board[i]=mySymbol;
    g.turn=mySymbol==="X"?"O":"X";
    return g;
  });
}

function updateBoard(board){
  document.querySelectorAll(".cell").forEach((c,i)=>{
    c.innerHTML="";
    if(board[i]){
      c.classList.add(board[i].toLowerCase());
      c.innerHTML="<span>"+board[i]+"</span>";
    }
  });
}

function updateStatus(g){
  if(g.status==="playing"){
    document.getElementById("status").innerText =
      g.turn===mySymbol?"Your Turn":"Opponent Turn";
  }
}

/* ================= REMATCH ================= */
function playAgain(){
  gameRef.child("rematch/"+mySymbol).set(true);
}

/* ================= END ================= */
function endGame(){
  if(gameRef) gameRef.remove();
  location.reload();
}

/* ================= CHAT ================= */
function sendMsg(){
  const msg=document.getElementById("chatInput").value;
  if(!msg) return;
  db.ref("games/"+gameId+"/chat").push({
    from:mySymbol,
    text:msg
  });
  document.getElementById("chatInput").value="";
}

function listenChat(){
  db.ref("games/"+gameId+"/chat").on("child_added", snap=>{
    const m=snap.val();
    const div=document.createElement("div");
    div.className="msg "+(m.from===mySymbol?"me":"other");
    div.innerText=m.text;
    const box=document.getElementById("messages");
    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
  });
}
</script>
</body>
</html>
